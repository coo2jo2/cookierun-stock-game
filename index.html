<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>쿠키 투자런</title>
    <style>
        body { background: #121212; color: white; font-family: 'Malgun Gothic', sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; border: 1px solid #333; padding: 20px; border-radius: 10px; }
        .header { display: flex; justify-content: space-between; margin-bottom: 20px; padding: 10px; background: #222; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: #2a2a2a; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #444; }
        .brand-img { width: 100%; height: 150px; object-fit: contain; background: #000; margin-bottom: 10px; }
        .input-box { width: 80%; padding: 8px; background: #111; color: #f1c40f; border: 1px solid #f1c40f; text-align: center; }
        .info-btn { display: none; background: #d35400; color: white; border: none; padding: 8px; margin: 5px; cursor: pointer; }
        .main-btn { width: 100%; height: 50px; background: #f1c40f; font-weight: bold; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>회차: <span id="turn-txt">1</span>/7</h2>
        <div>보유 점수: <input type="number" id="total-score" value="100000000" style="width:120px;"></div>
    </div>

    <div class="grid" id="game-grid"></div>

    <div style="margin-top:20px;">
        <strong>📂 획득 정보</strong>
        <div id="info-box"></div>
    </div>

    <button class="main-btn" onclick="nextStep()" id="step-btn">1회차 결과 보기</button>
</div>

<script>
    let turn = 1;
    let isInputMode = true;
    const cos = [
        {id:'c4', n:'마카로즈', b:0}, {id:'c3', n:'연금전자', b:7}, 
        {id:'c2', n:'포춘시스터즈', b:14}, {id:'c1', n:'뮤직엔터', b:21}
    ];

    // 가람님의 파일 목록에 맞춘 PDF 리스트
    const pdfs = ["HBS%20기사%20셈플.pdf", "직비모%20캡쳐%20파일.pdf", "포춘쿠키런%20카페%20유저들%20대화.pdf", "쿠키팝%20팬들%20커뮤니티.pdf", "제목.pdf", "마카로즈%20기사%20(폐기하세요).pdf", "쿠스패치%20단독%20기사.pdf"];

    function init() {
        const g = document.getElementById('game-grid');
        const ib = document.getElementById('info-box');
        cos.forEach(c => {
            g.innerHTML += `
                <div class="card">
                    <img id="img-${c.id}" src="${c.id}.png" class="brand-img">
                    <div id="res-${c.id}" style="font-size:0.8rem; color:#aaa; margin-bottom:5px;">금액을 입력하세요</div>
                    <div id="per-${c.id}" style="font-weight:bold; color:#2ecc71;"></div>
                    <input type="number" id="in-${c.id}" class="input-box" placeholder="투자금">
                </div>`;
        });
        pdfs.forEach((p, i) => {
            ib.innerHTML += `<button id="f-${i+1}" class="info-btn" onclick="window.open('${p}')">정보 ${i+1}</button>`;
        });
    }

    function nextStep() {
        if(isInputMode) {
            let currentScore = parseInt(document.getElementById('total-score').value);
            let profit = 0;
            cos.forEach(c => {
                const inv = parseInt(document.getElementById('in-'+c.id).value) || 0;
                const rNum = c.b + turn;
                const pCent = Math.floor(Math.random() * 40) - 20; // 가람님 로직용 임시 퍼센트
                
                document.getElementById('img-'+c.id).src = `r${rNum}.png`;
                document.getElementById('res-'+c.id).innerText = `r${rNum} 결과 적용`;
                document.getElementById('per-'+c.id).innerText = (pCent>=0?'+':'') + pCent + '%';
                
                currentScore -= inv;
                profit += inv * (1 + pCent/100);
            });
            document.getElementById('total-score').value = Math.floor(currentScore + profit);
            document.getElementById('f-'+turn).style.display = 'inline-block';
            document.getElementById('step-btn').innerText = (turn < 7) ? (turn+1)+'회차 준비' : '종료';
            isInputMode = false;
        } else {
            if(turn >= 7) return;
            turn++;
            document.getElementById('turn-txt').innerText = turn;
            cos.forEach(c => {
                document.getElementById('img-'+c.id).src = `${c.id}.png`;
                document.getElementById('res-'+c.id).innerText = '금액을 입력하세요';
                document.getElementById('per-'+c.id).innerText = '';
                document.getElementById('in-'+c.id).value = '';
            });
            document.getElementById('step-btn').innerText = turn + '회차 결과 보기';
            isInputMode = true;
        }
    }
    init();
</script>
</body>
</html>
